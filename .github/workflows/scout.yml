name: Daily Strategic Scout

on:
  schedule:
    - cron: '0 12 * * *' # 8:00 AM EDT
  workflow_dispatch:

jobs:
  run-scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: gives the bot permission to push code
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install groq feedparser

      - name: Execute Scout
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scout.py

      - name: Commit and Push Briefing
        run: |
          git config --global user.name "Strategic-Scout-Bot"
          git config --global user.email "actions@github.com"
          git add ai-daily/*.md
          git commit -m "Automated Daily Briefing: $(date +'%Y-%m-%d')" || exit 0
          git push