name: Daily Strategic Scout

on:
  schedule:
    # Runs at 12:00 UTC (8:00 AM EDT Waltham time)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  run-scout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          pip install groq google-cloud-storage feedparser

      - name: Execute Strategic Scout
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
        run: python scout.py