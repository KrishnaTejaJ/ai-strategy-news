name: Daily Strategic Scout

on:
  schedule:
    - cron: '0 12 * * *' # 8:00 AM EDT
  workflow_dispatch:

jobs:
  run-scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install groq feedparser

      - name: Execute Scout
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scout.py

      - name: Commit and Push Briefing
        run: |
          git config --global user.name "Strategic-Scout-Bot"
          git config --global user.email "actions@github.com"
          git add ai-daily/*.md
          git commit -m "Automated Daily Briefing: $(date +'%Y-%m-%d')" || exit 0
          git push

      - name: Update Gist with Briefing
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          DATE=$(date +'%Y-%m-%d')
          FILE="ai-daily/Daily_Briefing_${DATE}.md"
          if [ -f "$FILE" ]; then
            CONTENT=$(jq -Rs . < "$FILE")
            curl -s -X PATCH \
              -H "Authorization: token $GIST_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/gists/$GIST_ID \
              -d "{\"files\":{\"Daily_Briefing.md\":{\"content\":$CONTENT}}}"
            echo "Gist updated"
          fi